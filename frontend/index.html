<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Access Portal | KCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .focus-ring-blue:focus {
            --tw-ring-color: #3b82f6;
            outline: 2 none;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    
    <!-- Loading Overlay -->
    <div id="loadingScreen" class="fixed inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="mt-4 text-slate-500 font-medium text-sm">Verifying Session...</p>
    </div>

    <!-- Main Card -->
    <div id="mainContainer" class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden relative" style="display: none;">
        
        <!-- Header -->
        <div class="bg-slate-800 p-6 text-white relative">
            <button id="logoutBtn" class="absolute top-6 right-6 text-slate-400 hover:text-white transition-colors">
                <i class="fas fa-sign-out-alt"></i>
            </button>
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2.5 rounded-lg shadow-lg shadow-blue-600/20">
                    <i class="fas fa-desktop text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">Internet Access</h1>
                    <p class="text-slate-400 text-xs">Self-Service Access Portal</p>
                </div>
            </div>
        </div>

        <!-- Form -->
        <form id="accessForm" class="p-6 space-y-6">
            <div>
                <label for="service" class="block text-sm font-semibold text-slate-700 mb-1.5">Select Service <span class="text-red-500">*</span></label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                        <i class="fas fa-layer-group text-sm"></i>
                    </span>
                    <select id="service" name="service" required
                        class="block w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm transition-all focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:outline-none appearance-none">
                        <option value="anydesk">Anydesk</option>
                        <option value="teamviewer">TeamViewer</option>
                        <option value="internet">Internet for Server</option>
                        <option value="update_windows">Update Windows</option>
                    </select>
                    <span class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 pointer-events-none">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </span>
                </div>
            </div>

            <div id="ipContainer" class="space-y-3">
                <div class="flex items-center justify-between mb-1.5">
                    <label class="block text-sm font-semibold text-slate-700">IP Addresses <span class="text-red-500">*</span></label>
                    <button type="button" id="addIpBtn" class="text-blue-600 hover:text-blue-700 text-xs font-bold flex items-center space-x-1 transition-colors">
                        <i class="fas fa-plus-circle"></i>
                        <span>Add IP</span>
                    </button>
                </div>
                <div class="ip-row relative group">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                        <i class="fas fa-network-wired text-sm"></i>
                    </span>
                    <input type="text" name="ip[]" required 
                        placeholder="e.g. 10.10.x.x"
                        class="block w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm transition-all focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:outline-none">
                </div>
            </div>

            <div>
                <label for="cc_emails" class="block text-sm font-semibold text-slate-700 mb-1.5">CC Emails (Optional)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                        <i class="fas fa-envelope text-sm"></i>
                    </span>
                    <input type="text" id="cc_emails" name="cc_emails" 
                        placeholder="manager@kce.co.th, ..."
                        class="block w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm transition-all focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:outline-none">
                </div>
                <p class="text-[10px] text-slate-400 mt-1.5 italic">Separate multiple emails with commas (,)</p>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-blue-600/20 hover:bg-blue-700 hover:shadow-blue-700/30 active:scale-[0.98] transition-all flex items-center justify-center space-x-2 disabled:bg-slate-300 disabled:shadow-none">
                <span>Request Access</span>
                <i class="fas fa-chevron-right text-xs"></i>
            </button>
        </form>

        <!-- Status Message -->
        <div id="statusMessage" class="mx-6 mb-6 p-3.5 rounded-xl text-xs border flex items-start space-x-2.5 hidden">
            <div id="statusIcon"></div>
            <div id="statusText" class="font-medium"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
