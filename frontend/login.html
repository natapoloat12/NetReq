<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Internet Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden p-8 space-y-6">
        <div class="text-center space-y-2">
            <div class="inline-flex bg-blue-600 p-3 rounded-xl shadow-lg shadow-blue-600/20 mb-2">
                <i class="fas fa-key text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Login Required</h1>
            <p class="text-slate-500 text-sm">Please sign in with your Windows account</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="username" class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Username</label>
                <input type="text" id="username" name="username" required 
                    placeholder="e.g. yourname"
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm transition-all focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label for="password" class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Password</label>
                <input type="password" id="password" name="password" required 
                    placeholder="••••••••"
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm transition-all focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:outline-none">
            </div>
            <button type="submit" id="loginBtn"
                class="w-full bg-slate-800 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg hover:bg-slate-900 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                <span>Sign In</span>
                <i class="fas fa-sign-in-alt text-sm"></i>
            </button>
        </form>

        <div id="loginMessage" class="p-3.5 rounded-xl text-xs font-medium border border-red-100 bg-red-50 text-red-600 hidden text-center">
            Invalid username or password
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginMessage = document.getElementById('loginMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            loginMessage.classList.add('hidden');

            const payload = {
                username: loginForm.username.value,
                password: loginForm.password.value
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = 'index.html';
                } else {
                    loginMessage.textContent = data.message || 'Login failed';
                    loginMessage.classList.remove('hidden');
                }
            } catch (err) {
                loginMessage.textContent = 'Connection error. Please try again.';
                loginMessage.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
